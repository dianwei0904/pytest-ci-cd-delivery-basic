name: Python CI CD Delivery

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build-artifact:
    name: Test and Build Delivery Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check environment
        run: |
          bash scripts/check_env.sh

      - name: Run pytest validation
        run: |
          bash scripts/run_tests.sh

      - name: Build delivery package
        run: |
          bash scripts/build_delivery.sh

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-ci-cd-delivery-package
          path: delivery/pytest-ci-cd-delivery-basic.zip

  manual-approved-delivery:
    name: Manual Approved Delivery
    runs-on: ubuntu-latest
    needs: test-and-build-artifact

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: delivery-review

    steps:
      - name: Download delivery artifact
        uses: actions/download-artifact@v4
        with:
          name: pytest-ci-cd-delivery-package
          path: approved-delivery

      - name: Verify downloaded delivery artifact
        run: |
          echo "Checking approved delivery artifact..."
          ls -la approved-delivery
          test -f approved-delivery/pytest-ci-cd-delivery-basic.zip

      - name: Simulate approved delivery
        run: |
          echo "Manual approval received."
          echo "Delivery artifact is approved and ready for release."
          echo "This step simulates a controlled delivery after manual approval."